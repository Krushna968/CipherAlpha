<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CipherAlpha AI | FHE Intelligence Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Fira+Code:wght@400;500;600;700&amp;display=swap" rel="stylesheet" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Geist:wght@100;300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#d2bbff",
                "primary-fixed": "#7c3aed",
                tertiary: "#00FF94",     // Fhenix Green
                "tertiary-dim": "#4edea3",
                secondary: "#00F0FF",    // AI Cyan
                background: "#050505",   // Deep Void
                surface: "#0D1117",      // Dark Slate
                "surface-variant": "#161B22",
                "surface-container": "rgba(22, 27, 40, 0.6)",
                "surface-container-low": "rgba(13, 17, 23, 0.4)",
                "outline-variant": "rgba(223, 226, 241, 0.1)",
                "on-surface": "#dfe2f1",
                "on-surface-variant": "#8b949e",
                error: "#ffb4ab",
              },
              fontFamily: {
                sans: ["Inter", "sans-serif"],
                mono: ["Fira Code", "monospace"],
                headline: ["Inter", "sans-serif"],
                "h1-mobile": ["Space Grotesk"],
                "body-md": ["Geist"],
                "h1": ["Space Grotesk"],
                "code-label": ["JetBrains Mono"],
                "h2": ["Space Grotesk"],
                "body-lg": ["Geist"],
                "stat-value": ["Space Grotesk"],
                "h3": ["Space Grotesk"]
              }
            },
          },
        }

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
