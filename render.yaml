services:
  # Backend Node.js Service
  - type: web
    name: cipher-alpha-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FHE_SEPOLIA_RPC_URL
        sync: false
      - key: CIPHER_ALPHA_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: cipher-alpha-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: "https://cipher-alpha-backend.onrender.com"
